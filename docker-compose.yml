version: '3.8'

services:
  login_service:
    build: ./login_service
    container_name: login_service
    ports:
      - "5000:5000"
    environment:
      - SERVICE_NAME=login_service
    networks:
      - exam_network
    volumes:
      - login_db:/app/data

  question_service:
    build: ./question_service
    container_name: question_service
    ports:
      - "5001:5001"
    environment:
      - SERVICE_NAME=question_service
    networks:
      - exam_network
    volumes:
      - question_db:/app/data
    depends_on:
      - login_service

  exam_service:
    build: ./exam_service
    container_name: exam_service
    ports:
      - "5002:5002"
    environment:
      - SERVICE_NAME=exam_service
    networks:
      - exam_network
    volumes:
      - exam_db:/app/data
    depends_on:
      - login_service

  logging_service:
    build: ./logging_service
    container_name: logging_service
    ports:
      - "5003:5003"
    environment:
      - SERVICE_NAME=logging_service
    networks:
      - exam_network
    volumes:
      - logging_db:/app/data

  submission_service:
    build: ./submission_service
    container_name: submission_service
    ports:
      - "5004:5004"
    environment:
      - SERVICE_NAME=submission_service
    networks:
      - exam_network
    volumes:
      - submission_db:/app/data
    depends_on:
      - exam_service

  evaluation_service:
    build: ./evaluation_service
    container_name: evaluation_service
    ports:
      - "5005:5005"
    environment:
      - SERVICE_NAME=evaluation_service
    networks:
      - exam_network
    volumes:
      - evaluation_db:/app/data
    depends_on:
      - submission_service

  result_service:
    build: ./result_service
    container_name: result_service
    ports:
      - "5006:5006"
    environment:
      - SERVICE_NAME=result_service
    networks:
      - exam_network
    volumes:
      - result_db:/app/data
    depends_on:
      - evaluation_service

  api_gateway:
    build: ./api_gateway
    container_name: api_gateway
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=api_gateway
    networks:
      - exam_network
    depends_on:
      - login_service
      - question_service
      - exam_service
      - logging_service
      - submission_service
      - evaluation_service
      - result_service

networks:
  exam_network:
    driver: bridge

volumes:
  login_db:
  question_db:
  exam_db:
  logging_db:
  submission_db:
  evaluation_db:
  result_db: