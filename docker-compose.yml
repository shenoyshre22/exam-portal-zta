version: '3.8'

services:
  # Authentication Service
  login_service:
    build: ./login_service
    container_name: login_service
    ports:
      - "5000:5000"
    environment:
      - SERVICE_NAME=login_service
    networks:
      - exam_network
    volumes:
      - login_db:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Question Management Service
  question_service:
    build: ./question_service
    container_name: question_service
    ports:
      - "5001:5001"
    environment:
      - SERVICE_NAME=question_service
    networks:
      - exam_network
    volumes:
      - question_db:/app/data
    depends_on:
      login_service:
        condition: service_healthy
    expose:
      - "5001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Exam Service
  exam_service:
    build: ./exam_service
    container_name: exam_service
    ports:
      - "5002:5002"
    environment:
    volumes:
      - exam_db:/app/data
    depends_on:
      login_service:
        condition: service_healthy
    expose:
      - "5002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Logging Service
  logging_service:
    build: ./logging_service
    container_name: logging_service
    ports:
      - "5003:5003"
    environment:
    volumes:
      - logging_db:/app/data
    expose:
      - "5003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 2
      timeout: 5s
      retries: 3
      start_period: 10s

  # Submission Service
  submission_service:
    build: ./submission_service
    container_name: submission_service
    ports:
    volumes:
      - submission_db:/app/data
    depends_on:
      exam_service:
        condition: service_healthy
    expose:
      - "5004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 2
      test: ["CMD", "curl", "-f", "http://localhost:5004/docs"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Evaluation Service
  evaluation_service:
    build: ./evaluation_service
    container_name: evaluation_service
    ports:
    volumes:
      - evaluation_db:/app/data
    depends_on:
      submission_service:
        condition: service_healthy
    expose:
      - "5005"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 2
      test: ["CMD", "curl", "-f", "http://localhost:5005/docs"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Result Service
  result_service:
    build: ./result_service
    container_name: result_service
    volumes:
      - result_db:/app/data
    depends_on:
      evaluation_service:
        condition: service_healthy
    expose:
      - "5006"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5006/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5006/docs"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # API Gateway (Main Entry Point)
  api_gateway:
    build: ./api_gateway
    container_name: api_gateway
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=api_gateway
    networks:
      - exam_network
    depends_on:
      login_service:
        condition: service_healthy
      question_service:
        condition: service_healthy
      exam_service:
        condition: service_healthy
      logging_service:
        condition: service_healthy
      submission_service:
        condition: service_healthy
      evaluation_service:
        condition: service_healthy
      result_service:
        condition: service_healthy
      start_period: 20s

networks:
  exam_network:
    driver: bridge

volumes:
  login_db:
  question_db:
  exam_db:
  logging_db:
  submission_db:
  evaluation_db:
  result_db:
