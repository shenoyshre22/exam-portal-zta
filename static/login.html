<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Portal - Sign in</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f4f3 0%, #faf9f8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1a1a1a;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            margin-top: -40px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background-color: #ffffff;
            border: 0.5px solid #e8e8e8;
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            margin: 0 auto 16px;
            background-color: #e9d5ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #6b46c1;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
        }

        .product-name {
            font-size: 16px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 12px;
            color: #999999;
        }

        .form-section {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 14px;
            animation: slideIn 0.4s ease forwards;
            opacity: 0;
        }

        .form-group:nth-child(1) {
            animation-delay: 0.1s;
        }

        .form-group:nth-child(2) {
            animation-delay: 0.2s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .label-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #999999;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 8px 12px;
            font-size: 13px;
            border: 0.5px solid #d9d9d9;
            border-radius: 12px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #6b46c1;
            box-shadow: 0 0 0 2px rgba(107, 70, 193, 0.1);
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: #cccccc;
        }

        .password-strength {
            display: none;
            margin-top: 6px;
            font-size: 11px;
            color: #999999;
            align-items: center;
            gap: 6px;
        }

        .strength-bar {
            width: 40px;
            height: 3px;
            background-color: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            background-color: #ef4444;
            transition: width 0.3s ease, background-color 0.3s ease;
            border-radius: 2px;
        }

        .strength-fill.weak {
            width: 33%;
            background-color: #ef4444;
        }

        .strength-fill.fair {
            width: 66%;
            background-color: #f59e0b;
        }

        .strength-fill.good {
            width: 100%;
            background-color: #10b981;
        }

        .error-message {
            display: none;
            margin-top: 6px;
            font-size: 12px;
            color: #ef4444;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-5px);
            }
            75% {
                transform: translateX(5px);
            }
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #6b46c1;
        }

        .checkbox-label {
            font-size: 12px;
            color: #666666;
            cursor: pointer;
            user-select: none;
        }

        .forgot-password {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 12px;
        }

        .forgot-password a {
            color: #6b46c1;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .forgot-password a:hover {
            color: #5a3aad;
            text-decoration: underline;
        }

        .signin-button {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            background-color: #6b46c1;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: slideIn 0.4s ease 0.3s forwards;
            opacity: 0;
        }

        .signin-button:hover:not(:disabled) {
            background-color: #5a3aad;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(107, 70, 193, 0.2);
        }

        .signin-button:active:not(:disabled) {
            background-color: #4a2a8f;
            transform: translateY(0);
        }

        .signin-button:disabled {
            background-color: #b4a0d3;
            cursor: not-allowed;
        }

        .button-loader {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999999;
            animation: slideIn 0.4s ease 0.4s forwards;
            opacity: 0;
        }

        .footer a {
            color: #6b46c1;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: #5a3aad;
        }

        .success-message {
            display: none;
            padding: 12px;
            background-color: #f0fdf4;
            border: 0.5px solid #86efac;
            border-radius: 8px;
            color: #166534;
            font-size: 12px;
            margin-bottom: 16px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-message {
            display: none;
            padding: 12px;
            background-color: #fef2f2;
            border: 0.5px solid #fecaca;
            border-radius: 8px;
            color: #991b1b;
            font-size: 12px;
            margin-bottom: 16px;
            animation: slideDown 0.3s ease;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 20px;
            }

            .header {
                margin-bottom: 28px;
            }

            .form-group:last-of-type {
                margin-bottom: 20px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="header">
                <div class="avatar">E</div>
                <h1 class="product-name">Exam portal</h1>
                <p class="subtitle">Sign in to continue</p>
            </div>

            <div class="success-message" id="successMessage">✓ Login successful! Redirecting...</div>
            <div class="alert-message" id="alertMessage"></div>

            <form id="login-form">
                <div class="form-section">
                    <div class="form-group">
                        <div class="label-wrapper">
                            <label for="username">Username</label>
                        </div>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="username" 
                                name="username" 
                                placeholder="Enter your username or email"
                                required
                                autocomplete="username"
                            >
                        </div>
                        <div class="error-message" id="usernameError"></div>
                    </div>

                    <div class="form-group">
                        <div class="label-wrapper">
                            <label for="password">Password</label>
                        </div>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Enter your password"
                                required
                                autocomplete="current-password"
                            >
                        </div>
                        <div class="error-message" id="passwordError"></div>
                        <div class="password-strength" id="passwordStrength">
                            <span class="strength-label">Strength:</span>
                            <div class="strength-bar">
                                <div class="strength-fill" id="strengthFill"></div>
                            </div>
                            <span id="strengthText"></span>
                        </div>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input 
                        type="checkbox" 
                        id="remember" 
                        name="remember"
                    >
                    <label for="remember" class="checkbox-label">Remember me</label>
                </div>

                <div class="forgot-password">
                    <div></div>
                    <a href="/forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="signin-button" id="signinBtn">
                    <span id="buttonText">Sign in</span>
                    <div class="button-loader" id="buttonLoader"></div>
                </button>
            </form>

            <div class="footer">
                Don't have an account? <a href="/signup">Sign up</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const rememberCheckbox = document.getElementById('remember');
        const signinBtn = document.getElementById('signinBtn');
        const buttonLoader = document.getElementById('buttonLoader');
        const buttonText = document.getElementById('buttonText');
        const successMessage = document.getElementById('successMessage');
        const alertMessage = document.getElementById('alertMessage');
        const usernameError = document.getElementById('usernameError');
        const passwordError = document.getElementById('passwordError');
        const passwordStrength = document.getElementById('passwordStrength');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        // Load saved username if "Remember me" was checked
        window.addEventListener('load', () => {
            const savedUsername = localStorage.getItem('exam_portal_username');
            if (savedUsername) {
                usernameInput.value = savedUsername;
                rememberCheckbox.checked = true;
            }
        });

        // Username validation
        usernameInput.addEventListener('blur', () => {
            validateUsername();
        });

        usernameInput.addEventListener('input', () => {
            if (usernameError.style.display === 'block') {
                validateUsername();
            }
        });

        function validateUsername() {
            const username = usernameInput.value.trim();
            if (!username) {
                showError(usernameError, 'Username is required');
                return false;
            }
            if (username.length < 3) {
                showError(usernameError, 'Username must be at least 3 characters');
                return false;
            }
            hideError(usernameError);
            return true;
        }

        // Password validation and strength meter
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            updatePasswordStrength(password);
            
            if (passwordError.style.display === 'block') {
                validatePassword();
            }
        });

        passwordInput.addEventListener('blur', () => {
            validatePassword();
        });

        function validatePassword() {
            const password = passwordInput.value;
            if (!password) {
                showError(passwordError, 'Password is required');
                return false;
            }
            if (password.length < 6) {
                showError(passwordError, 'Password must be at least 6 characters');
                return false;
            }
            hideError(passwordError);
            return true;
        }

        function updatePasswordStrength(password) {
            if (!password) {
                passwordStrength.style.display = 'none';
                return;
            }

            passwordStrength.style.display = 'flex';

            let strength = 0;
            let label = 'Weak';

            // Check password criteria
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            // Determine strength level
            if (strength <= 2) {
                label = 'Weak';
                strengthFill.className = 'strength-fill weak';
            } else if (strength <= 3) {
                label = 'Fair';
                strengthFill.className = 'strength-fill fair';
            } else {
                label = 'Good';
                strengthFill.className = 'strength-fill good';
            }

            strengthText.textContent = label;
        }

        function showError(element, message) {
            element.textContent = message;
            element.style.display = 'block';
        }

        function hideError(element) {
            element.style.display = 'none';
            element.textContent = '';
        }

        function showAlert(message, type = 'error') {
            alertMessage.textContent = message;
            if (type === 'error') {
                alertMessage.style.backgroundColor = '#fef2f2';
                alertMessage.style.borderColor = '#fecaca';
                alertMessage.style.color = '#991b1b';
            } else if (type === 'warning') {
                alertMessage.style.backgroundColor = '#fffbeb';
                alertMessage.style.borderColor = '#fde68a';
                alertMessage.style.color = '#92400e';
            }
            alertMessage.style.display = 'block';
            alertMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function hideAlert() {
            alertMessage.style.display = 'none';
        }

        function setLoading(isLoading) {
            signinBtn.disabled = isLoading;
            buttonLoader.style.display = isLoading ? 'block' : 'none';
            buttonText.textContent = isLoading ? 'Signing in...' : 'Sign in';
        }

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            // Validate all fields
            const isUsernameValid = validateUsername();
            const isPasswordValid = validatePassword();

            if (!isUsernameValid || !isPasswordValid) {
                return;
            }

            setLoading(true);
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    // Save username if "Remember me" is checked
                    if (rememberCheckbox.checked) {
                        localStorage.setItem('exam_portal_username', username);
                    } else {
                        localStorage.removeItem('exam_portal_username');
                    }

                    successMessage.style.display = 'block';
                    
                    // Redirect after a short delay
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else if (response.status === 401) {
                    setLoading(false);
                    showAlert('Invalid username or password', 'error');
                    passwordInput.value = '';
                    updatePasswordStrength('');
                    passwordInput.focus();
                } else if (response.status === 429) {
                    setLoading(false);
                    showAlert('Too many login attempts. Please try again later.', 'warning');
                } else {
                    setLoading(false);
                    showAlert('An error occurred. Please try again.', 'error');
                }
            } catch (error) {
                setLoading(false);
                console.error('Login error:', error);
                showAlert('Connection error. Please check your internet and try again.', 'error');
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + Enter to submit
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });

        // Focus management
        usernameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                passwordInput.focus();
                e.preventDefault();
            }
        });

        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
